version: '3.8'

services:
  minecraft:
    image: itzg/minecraft-server:latest
    container_name: monkeyland_minecraft
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "SPIGOT"
      VERSION: "1.21.1"
      MEMORY: "2G"
      JVM_OPTS: "-Xmx2G -Xms2G"
      DIFFICULTY: "hard"
      GAMEMODE: "survival"
      ALLOW_FLIGHT: "false"
      SPAWN_PROTECTION: "16"
      PVP: "true"
    volumes:
      - minecraft_data:/data
    restart: unless-stopped

volumes:
  minecraft_data:
    driver: local
